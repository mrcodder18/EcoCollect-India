<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EcoCollect</title>
    <style>
        :root { --primary: #028024; --secondary: #f47f20; --dark: #2c3e50; --light: #f4f7f6; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: var(--light); display: flex; justify-content: center; align-items: center; height: 100vh; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--primary); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1rem; }
        .btn-login { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .error-msg { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 5px; margin-bottom: 20px; display: none; }
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo">EcoCollect Admin</div>
        <div class="error-msg" id="errorMsg">Invalid Username or Password!</div>
        <form onsubmit="attemptLogin(event)">
            <div class="form-group"><label>Username</label><input type="text" id="username" required></div>
            <div class="form-group"><label>Password</label><input type="password" id="password" required></div>
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>
        <a href="recycle_customer.html" class="back-link">&larr; Back to Main Website</a>
    </div>
    <script>
        function attemptLogin(event) {
            event.preventDefault();
            if (document.getElementById('username').value === 'admin' && document.getElementById('password').value === 'admin123') {
                localStorage.setItem('eco_admin_logged_in', 'true');
                window.location.href = 'recycle_admin.html';
            } else {
                document.getElementById('errorMsg').style.display = 'block';
                document.getElementById('password').value = ''; 
            }
        }
    </script>
</body>
</html>
