<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - EcoCollect</title>
    <style>
        :root {
            --primary: #028024; 
            --secondary: #f47f20; 
            --dark: #2c3e50;
            --light: #f4f7f6;
            --border: #ccc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--light); display: flex; justify-content: center; align-items: center; height: 100vh; }
        
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; border-top: 5px solid var(--primary); }
        .logo { font-size: 1.8rem; font-weight: bold; color: var(--primary); margin-bottom: 5px; }
        .logo span { color: var(--secondary); }
        .subtitle { color: #666; margin-bottom: 30px; font-size: 0.95rem; }

        .form-group { margin-bottom: 20px; text-align: left; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--dark); font-size: 0.9rem; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 1rem; outline: none; transition: 0.3s; }
        .form-group input:focus { border-color: var(--primary); }
        
        .btn-login { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; font-size: 1.1rem; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-login:hover { background: #015c19; }

        .error-msg { color: #d32f2f; background: #ffebee; padding: 10px; border-radius: 5px; font-size: 0.9rem; margin-bottom: 20px; display: none; }
        
        .back-link { display: block; margin-top: 20px; color: #888; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { color: var(--primary); text-decoration: underline; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">EcoCollect <span>Admin</span></div>
        <div class="subtitle">Secure Portal Access</div>

        <div class="error-msg" id="errorMsg">Invalid Username or Password!</div>

        <form onsubmit="attemptLogin(event)">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="Enter admin username" required>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Enter password" required>
            </div>
            <button type="submit" class="btn-login">Login to Dashboard</button>
        </form>

        <a href="recycle_customer.html" class="back-link">&larr; Back to Main Website</a>
    </div>

    <script>
        function attemptLogin(event) {
            event.preventDefault(); // Prevent form from refreshing the page
            
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            // Hardcoded check for frontend simulation
            if (user === 'admin' && pass === 'admin123') {
                // Save a secure session token in the browser
                localStorage.setItem('eco_admin_logged_in', 'true');
                
                // Redirect to the dashboard
                window.location.href = 'recycle_admin.html';
            } else {
                // Show error
                errorMsg.style.display = 'block';
                document.getElementById('password').value = ''; // clear password field
            }
        }
    </script>

</body>
</html>
